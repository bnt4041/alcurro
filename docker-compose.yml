services:
  db:
    image: postgres:16-alpine
    container_name: hrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hrm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hrm_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hrm}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data   # bind mount → migración fácil
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hrm} -d ${POSTGRES_DB:-hrm}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hrm-net

  ollama:
    image: ollama/ollama:latest
    container_name: hrm-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - hrm-net

  # WhatsApp compartido (goWA) — una sola línea para todas las cuentas
  gowa:
    image: ghcr.io/aldinokemal/go-whatsapp-web-multidevice:latest
    container_name: hrm-gowa
    restart: unless-stopped
    command: ["rest", "--port=3000"]
    environment:
      WHATSAPP_WEBHOOK: http://backend:8000/webhook/whatsapp
      WHATSAPP_WEBHOOK_EVENTS: message
      APP_PORT: "3000"
      APP_BASIC_AUTH: ${GOWA_BASIC_AUTH:-admin:admin}
      APP_OS: Chrome
      APP_ACCOUNT_VALIDATION: "false"
    volumes:
      - ./data/gowa:/app/storages                  # bind mount → sesiones WA portables
    ports:
      - "3000:3000"
    networks:
      - hrm-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hrm}:${POSTGRES_PASSWORD:-hrm_secret}@db:5432/${POSTGRES_DB:-hrm}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-hrm-jwt-secret}
      DOCKER_NETWORK: hrm-net
      PLATFORM_SETUP_KEY: ${PLATFORM_SETUP_KEY:-hrm-platform-setup}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SIMULATION_MODE: ${STRIPE_SIMULATION_MODE:-true}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5174}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-chat}
      DEEPSEEK_BASE_URL: ${DEEPSEEK_BASE_URL:-https://api.deepseek.com}
    volumes:
      - ./backend:/app
      - ./data/uploads:/app/uploads                # bind mount → documentos portables
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    networks:
      - hrm-net
    command: sh -c "pip install -q -r requirements.txt && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    image: nginx:alpine
    container_name: hrm-frontend
    restart: unless-stopped
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
    networks:
      - hrm-net
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`alcurro.es`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"

volumes:
  ollama_data:            # modelos Ollama (grandes, re-descargables — no necesitan bind mount)
  frontend_node_modules:  # caché de dependencias npm/bun en dev

networks:
  hrm-net:
    name: hrm-net
    driver: bridge
