# Producción — usar con: docker compose -f docker-compose.prod.yml --env-file .env up -d --build
# Ver docs/deploy.md

services:

  # ── TRAEFIK (edge router + SSL automático) ────────────────────────────────
  traefik:
    image: traefik:v2.11
    container_name: hrm-traefik
    restart: unless-stopped
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=hrm-net"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      # HTTP → HTTPS redirect global
      - "--entrypoints.web.http.redirections.entryPoint.to=websecure"
      - "--entrypoints.web.http.redirections.entryPoint.scheme=https"
      - "--entrypoints.web.http.redirections.entryPoint.permanent=true"
      # Let's Encrypt (HTTP-01 challenge por puerto 80)
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=beni4041@gmail.com"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOCKER_API_VERSION=1.41
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_letsencrypt:/letsencrypt
    networks:
      - hrm-net

  # ── FRONTEND (Nginx estático, servido por Traefik) ────────────────────────
  frontend:
    image: nginx:alpine
    container_name: hrm-frontend
    restart: unless-stopped
    volumes:
      - /var/www/alcurro/frontend/dist:/usr/share/nginx/html:ro
      - /var/www/alcurro/deploy/nginx-spa.conf:/etc/nginx/conf.d/default.conf:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.frontend.rule=Host(`alcurro.es`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.frontend.priority=1"
      - "traefik.http.services.frontend.loadbalancer.server.port=80"
    networks:
      - hrm-net

  # ── BASE DE DATOS ─────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: hrm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hrm-net

  # ── OLLAMA (IA) ───────────────────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: hrm-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - hrm-net

  # ── GOWA (WhatsApp) ───────────────────────────────────────────────────────
  gowa:
    image: ${GOWA_IMAGE:-ghcr.io/aldinokemal/go-whatsapp-web-multidevice:latest}
    container_name: hrm-gowa
    restart: unless-stopped
    command: ["rest", "--port=3000"]
    environment:
      WHATSAPP_WEBHOOK: http://backend:8000/webhook/whatsapp
      WHATSAPP_WEBHOOK_EVENTS: message
      APP_PORT: "3000"
      APP_BASIC_AUTH: ${GOWA_BASIC_AUTH}
      APP_OS: Chrome
      APP_ACCOUNT_VALIDATION: "false"
    volumes:
      - gowa_data:/app/storages
    ports:
      - "127.0.0.1:3000:3000"
    depends_on:
      - backend
    networks:
      - hrm-net

  # ── BACKEND (FastAPI, enrutado por Traefik) ───────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrm-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      JWT_SECRET: ${JWT_SECRET}
      DOCKER_NETWORK: hrm-net
      PLATFORM_SETUP_KEY: ${PLATFORM_SETUP_KEY}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-}
      STRIPE_SIMULATION_MODE: ${STRIPE_SIMULATION_MODE:-false}
      PUBLIC_APP_URL: ${PUBLIC_APP_URL}
      GOWA_SEND_URL: http://gowa:3000/send/message
      GOWA_BASIC_AUTH: ${GOWA_BASIC_AUTH}
    volumes:
      - uploads_data:/app/uploads
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_started
    labels:
      - "traefik.enable=true"
      # Rutas API (mayor prioridad que el frontend)
      - "traefik.http.routers.backend.rule=Host(`alcurro.es`) && (PathPrefix(`/api/`) || PathPrefix(`/uploads/`) || PathPrefix(`/webhook/`) || Path(`/health`))"
      - "traefik.http.routers.backend.entrypoints=websecure"
      - "traefik.http.routers.backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.backend.priority=10"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"
      # Límite de subida de archivos (25 MB)
      - "traefik.http.middlewares.upload-limit.buffering.maxRequestBodyBytes=26214400"
      - "traefik.http.routers.backend.middlewares=upload-limit"
    networks:
      - hrm-net
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2

volumes:
  postgres_data:
  ollama_data:
  gowa_data:
  uploads_data:
  traefik_letsencrypt:

networks:
  hrm-net:
    name: hrm-net
    driver: bridge
